{% extends 'admin_dashboard/base_admin.html' %}

{% block title %}Add Internship - Admin{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        border-radius: 15px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .form-title {
        font-size: 1.5rem;
        color: #333;
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .form-title i {
        color: #667eea;
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group.full-width {
        grid-column: span 2;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #333;
        font-weight: 500;
    }

    .form-control {
        width: 100%;
        padding: 0.8rem;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea.form-control {
        resize: vertical;
        min-height: 100px;
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }

    .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }

    .file-input-group {
        border: 2px dashed #e5e7eb;
        padding: 1.5rem;
        border-radius: 8px;
        text-align: center;
        position: relative;
        transition: all 0.3s ease;
    }

    .file-input-group:hover {
        border-color: #667eea;
        background: #f8f9fa;
    }

    .file-input-group input[type="file"] {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        opacity: 0;
        cursor: pointer;
    }

    .file-label {
        color: #667eea;
        font-weight: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
    }

    .file-label i {
        font-size: 2rem;
    }

    .file-name {
        margin-top: 0.5rem;
        color: #666;
        font-size: 0.9rem;
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #e5e7eb;
    }

    .btn {
        padding: 0.8rem 2rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
        background: #e5e7eb;
        color: #333;
    }

    .btn-secondary:hover {
        background: #d1d5db;
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }

        .form-group.full-width {
            grid-column: span 1;
        }

        .form-actions {
            flex-direction: column;
        }

        .btn {
            width: 100%;
            justify-content: center;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="form-title">
        <i class="fas fa-plus-circle"></i>
        Add New Internship
    </h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label for="company">Company Name *</label>
                <input type="text" id="company" name="company" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="position">Position *</label>
                <input type="text" id="position" name="position" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="start_date">Start Date *</label>
                <input type="date" id="start_date" name="start_date" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" id="end_date" name="end_date" class="form-control">
            </div>

            <div class="form-group full-width">
                <div class="checkbox-group">
                    <input type="checkbox" id="current" name="current">
                    <label for="current">I currently work here</label>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="description">Description *</label>
                <textarea id="description" name="description" class="form-control" required></textarea>
            </div>

            <div class="form-group full-width">
                <label for="achievements">Key Achievements (one per line)</label>
                <textarea id="achievements" name="achievements" class="form-control" placeholder="• Led a team of 5 developers&#10;• Increased efficiency by 30%&#10;• Implemented new feature"></textarea>
            </div>

            <div class="form-group full-width">
                <label for="technologies">Technologies Used *</label>
                <input type="text" id="technologies" name="technologies" class="form-control" placeholder="Python, Django, React, PostgreSQL" required>
                <small style="color: #666;">Separate with commas</small>
            </div>

            <div class="form-group full-width">
                <label>Company Logo</label>
                <div class="file-input-group">
                    <input type="file" id="company_logo" name="company_logo" accept="image/*" onchange="updateFileName(this, 'logo-file-name')">
                    <div class="file-label">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>Click to upload company logo</span>
                    </div>
                    <div id="logo-file-name" class="file-name">No file chosen</div>
                </div>
            </div>

            <div class="form-group">
                <label for="order">Display Order</label>
                <input type="number" id="order" name="order" class="form-control" value="0" min="0">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Add Internship
            </button>
            <a href="{% url 'internships_list' %}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>

<script>
    function updateFileName(input, spanId) {
        const span = document.getElementById(spanId);
        if (input.files.length > 0) {
            span.textContent = input.files[0].name;
        } else {
            span.textContent = 'No file chosen';
        }
    }

    // Toggle end date based on current checkbox
    document.getElementById('current').addEventListener('change', function() {
        const endDate = document.getElementById('end_date');
        endDate.disabled = this.checked;
        if (this.checked) {
            endDate.value = '';
        }
    });
</script>
{% endblock %}
